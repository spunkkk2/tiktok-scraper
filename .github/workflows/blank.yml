name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
jobs:
  test_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Build package
        run: python -m build
